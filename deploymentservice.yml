# =========================================
# ConfigMap for Mongo Sample File
# =========================================
apiVersion: v1
kind: ConfigMap

metadata:
  name: mongo-import-config

data:
  sample_posts.json: |
    []

---
# =========================================
# MongoDB Persistent Volume Claim
# =========================================
apiVersion: v1
kind: PersistentVolumeClaim

metadata:
  name: mongodb-pvc

spec:
  accessModes:
    - ReadWriteOnce

  resources:
    requests:
      storage: 1Gi

---
# =========================================
# MongoDB Deployment
# =========================================
apiVersion: apps/v1
kind: Deployment

metadata:
  name: mongodb-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mongodb

  template:
    metadata:
      labels:
        app: mongodb

    spec:
      containers:
        - name: mongodb-container
          image: mongo:latest

          ports:
            - containerPort: 27017

          volumeMounts:
            - name: mongodb-storage
              mountPath: /data/db

      volumes:
        - name: mongodb-storage
          persistentVolumeClaim:
            claimName: mongodb-pvc

---
# =========================================
# MongoDB Service
# =========================================
apiVersion: v1
kind: Service

metadata:
  name: mongodb-service

spec:
  selector:
    app: mongodb

  ports:
    - port: 27017
      targetPort: 27017

  type: ClusterIP

---
# =========================================
# Mongo Import Job
# =========================================
apiVersion: batch/v1
kind: Job

metadata:
  name: mongo-import-job

spec:
  template:
    spec:
      restartPolicy: Never

      initContainers:
        - name: wait-for-mongodb
          image: busybox

          command:
            - sh
            - -c
            - |
              until nc -z mongodb-service 27017;
              do
                echo "Waiting for MongoDB...";
                sleep 5;
              done;

      containers:
        - name: mongo-import
          image: mongo:latest

          command:
            - sh
            - -c
            - |
              mongoimport \
              --host mongodb-service \
              --db wanderlust \
              --collection posts \
              --file /config/sample_posts.json \
              --jsonArray

          volumeMounts:
            - name: mongo-import-volume
              mountPath: /config

      volumes:
        - name: mongo-import-volume
          configMap:
            name: mongo-import-config

---
# =========================================
# Backend Deployment
# =========================================
apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      initContainers:
        - name: wait-for-mongodb
          image: busybox

          command:
            - sh
            - -c
            - |
              until nc -z mongodb-service 27017;
              do
                echo "Waiting for MongoDB...";
                sleep 5;
              done;

      containers:
        - name: backend-container
          image: yashwantlohar/wan-backend:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 5000

          env:
            - name: MONGO_URI
              value: mongodb://mongodb-service:27017/wanderlust

---
# =========================================
# Backend Service
# =========================================
apiVersion: v1
kind: Service

metadata:
  name: backend-service

spec:
  selector:
    app: backend

  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30050

  type: NodePort

---
# =========================================
# Frontend Deployment
# =========================================
apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      initContainers:
        - name: wait-for-backend
          image: busybox

          command:
            - sh
            - -c
            - |
              until nc -z backend-service 5000;
              do
                echo "Waiting for backend...";
                sleep 5;
              done;

      containers:
        - name: frontend-container
          image: yashwantlohar/wan-frontend:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 5173

---
# =========================================
# Frontend Service
# =========================================
apiVersion: v1
kind: Service

metadata:
  name: frontend-service

spec:
  selector:
    app: frontend

  ports:
    - port: 5173
      targetPort: 5173
      nodePort: 30173

  type: NodePort
